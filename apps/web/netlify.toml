[build]
  # Since this is a monorepo, we build the entire project from the root
  command = "pnpm run build"
  
  # We specify the publish directory for the main web application
  publish = ".next"

[build.environment]
  # Tell Netlify to use pnpm (matches the package manager in package.json)
  PNPM_FLAGS = "--shamefully-hoist"
  
  # Ensure Node 20 is used, as required by the Next.js and the project
  NODE_VERSION = "20"
  
  # Set Next.js telemetry to disabled for slightly faster builds
  NEXT_TELEMETRY_DISABLED = "1"

# Automatically apply the Next.js plugin if Netlify doesn't do it inherently
[[plugins]]
  package = "@netlify/plugin-nextjs"
